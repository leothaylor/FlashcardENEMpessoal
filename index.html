<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Estudo Ativo PRO - Múltipla Escolha</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script src="flashcards.js"></script>

  <style>
    /* ==========================================================
       TOKENS & VARIÁVEIS BASE
       ========================================================== */
    :root {
      --bg-body: #f1f3f5;
      --bg-card: #ffffff;
      --border: #dee2e6;
      --border-focus: #adb5bd;
      --txt-main: #212529;
      --txt-muted: #495057;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --good: #16a34a;
      --good-hover: #15803d;
      --bad: #dc2626;
      --bad-hover: #b91c1c;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,.05);
      --tap: 48px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; color: var(--txt-main); background: var(--bg-body); }
    body { padding-bottom: env(safe-area-inset-bottom); }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #ced4da; border-radius: 4px; }

    /* ==========================================================
       ESTRUTURA DE TELAS
       ========================================================== */
    .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
    .screen.active { display: flex; }

    .btn {
      min-height: var(--tap); padding: 12px 16px; border-radius: 10px; font-weight: 800; cursor: pointer;
      border: 1px solid var(--border); background: #fff; color: var(--txt-main); transition: .15s; font-size: 14px;
      user-select: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { background: #e9ecef; }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-block { display: flex; width: 100%; margin-bottom: 12px; }

    /* ==========================================================
       HOME
       ========================================================== */
    .home-container {
      text-align: center; width: min(600px, 100%); margin: auto; background: var(--bg-card);
      padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .home-container h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
    .home-container p { color: var(--txt-muted); margin-bottom: 24px; line-height: 1.5; font-size: 14px; }
    .stats-row { display: flex; gap: 10px; margin-bottom: 24px; }
    .stat-mini { flex: 1; padding: 12px; background: #f8f9fa; border: 1px solid var(--border); border-radius: 10px; }
    .stat-mini strong { display: block; font-size: 20px; color: var(--accent); }
    .stat-mini span { font-size: 11px; font-weight: 700; color: var(--txt-muted); text-transform: uppercase; }

    /* ==========================================================
       SESSÃO DE FLASHCARDS (MÚLTIPLA ESCOLHA)
       ========================================================== */
    .study-layout { width: min(800px, 100%); flex: 1; display: flex; flex-direction: column; }
    .session-header {
      background: var(--bg-card); padding: 14px 16px; border-radius: var(--radius); border: 1px solid var(--border);
      box-shadow: var(--shadow); margin-bottom: 16px; display: flex; flex-direction: column; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .top-bar { display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
    
    .perf-bar-bg { width: 100%; height: 8px; background: #e9ecef; border-radius: 999px; overflow: hidden; display: flex; }
    .perf-fill-good { height: 100%; background: var(--good); transition: width 0.3s ease; }
    .perf-fill-bad { height: 100%; background: var(--bad); transition: width 0.3s ease; }

    .card-static {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 24px; margin-bottom: 16px; width: 100%;
      display: flex; flex-direction: column;
    }
    .card-meta { font-size: 12px; font-weight: 800; color: var(--accent); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px;}
    .card-content { font-size: 18px; font-weight: 700; line-height: 1.5; white-space: pre-wrap; margin-bottom: 24px; }
    
    .alts-container { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .alt-btn {
      display: flex; gap: 12px; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px;
      background: #fff; cursor: pointer; text-align: left; font-size: 15px; align-items: center; 
      transition: 0.15s; color: var(--txt-main); line-height: 1.4;
    }
    .alt-btn:hover:not(:disabled) { border-color: var(--border-focus); background: #f8f9fa; }
    .alt-btn:disabled { cursor: default; }
    .alt-btn.correct { border-color: var(--good); background: #f0fdf4; color: var(--good-hover); font-weight: 700; }
    .alt-btn.wrong { border-color: var(--bad); background: #fef2f2; color: var(--bad-hover); font-weight: 700; }
    
    .alt-letter {
      font-weight: 900; color: var(--txt-muted); min-width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 6px; border: 1px solid #e9ecef; background: #f8f9fa; flex-shrink: 0;
    }
    .alt-btn.correct .alt-letter { background: var(--good); color: #fff; border-color: var(--good); }
    .alt-btn.wrong .alt-letter { background: var(--bad); color: #fff; border-color: var(--bad); }

    .action-area { display: flex; opacity: 0; pointer-events: none; transition: opacity 0.3s; margin-bottom: 40px; }
    .action-area.visible { opacity: 1; pointer-events: auto; }

    /* ==========================================================
       CONQUISTAS
       ========================================================== */
    .medals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin-top: 20px; }
    .medal-box {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px 10px; text-align: center; filter: grayscale(100%); opacity: 0.5; transition: 0.3s;
    }
    .medal-box.unlocked { filter: grayscale(0%); opacity: 1; border-color: #f59e0b; background: #fffbeb; }
    .medal-icon { font-size: 32px; margin-bottom: 8px; display: block; }
    .medal-title { font-size: 11px; font-weight: 800; color: var(--txt-main); }

    /* ==========================================================
       RELATÓRIO DE SESSÃO
       ========================================================== */
    .report-card { background: var(--bg-card); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); width: min(800px, 100%); margin: auto; }
    .report-header { text-align: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .r-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .r-item { padding: 16px; border-left: 6px solid var(--border); background: #f8f9fa; border-radius: 8px; font-size: 14px; line-height: 1.6; }
    .r-item.r-hit { border-left-color: var(--good); }
    .r-item.r-miss { border-left-color: var(--bad); }
    .r-item-q { font-weight: 800; margin-bottom: 10px; font-size: 15px; }
    .r-item-a { color: var(--txt-muted); }

    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <div id="screenHome" class="screen active">
    <div class="home-container">
      <h1>🧠 Estudo Ativo PRO</h1>
      <p>Sistema científico de repetição espaçada e gamificação.</p>

      <div class="stats-row">
        <div class="stat-mini"><strong id="stTotal">0</strong><span>Total Cards</span></div>
        <div class="stat-mini"><strong id="stAcertos">0</strong><span>Acertos Globais</span></div>
        <div class="stat-mini"><strong id="stFogo">0</strong><span>Fogo Atual</span></div>
      </div>

      <button class="btn btn-primary btn-block" onclick="startSession('revisao')">
        📚 Iniciar Revisões de Hoje (<span id="countRevisao">0</span>)
      </button>
      <button class="btn btn-block" onclick="startSession('livre')">
        🔄 Estudo Livre (Todos)
      </button>
      <button class="btn btn-block" onclick="showScreen('screenMedals'); renderMedals();">
        🏆 Conquistas
      </button>
      
      <div style="display:flex; gap:10px; margin-top: 20px;">
        <button class="btn" style="flex:1" onclick="exportData()">⬇️ Exportar Backup</button>
        <label class="btn" style="flex:1">
          ⬆️ Importar Backup
          <input type="file" id="importFile" accept=".json" onchange="importData(event)">
        </label>
      </div>
    </div>
  </div>

  <div id="screenStudy" class="screen">
    <div class="study-layout">
      
      <div class="session-header">
        <div class="top-bar">
          <span id="sessionCounter">Card 1 / 10</span>
          <button class="btn" style="min-height: 30px; padding: 6px 12px; font-size: 12px;" onclick="finishSession()">Encerrar Sessão</button>
        </div>
        <div class="perf-bar-bg">
          <div id="perfGood" class="perf-fill-good" style="width: 0%"></div>
          <div id="perfBad" class="perf-fill-bad" style="width: 0%"></div>
        </div>
      </div>

      <div class="card-static" id="flashcardNode">
        <div class="card-meta" id="cardTema">TEMA</div>
        <div class="card-content" id="cardPergunta">Pergunta aqui?</div>
        <div class="alts-container" id="altsContainer"></div>
      </div>

      <div class="action-area" id="actionArea">
        <button class="btn btn-primary" style="width:100%; font-size: 16px; padding: 16px;" onclick="advanceCard()">Próximo Card ➔</button>
      </div>

    </div>
  </div>

  <div id="screenMedals" class="screen">
    <div class="home-container" style="max-width: 800px;">
      <h1>🏆 Conquistas</h1>
      <p>Seu progresso gamificado baseado em consistência e volume.</p>
      <div class="medals-grid" id="medalsContainer"></div>
      <button class="btn btn-primary btn-block" style="margin-top: 30px;" onclick="showScreen('screenHome')">Voltar à Home</button>
    </div>
  </div>

  <div id="screenReport" class="screen">
    <div class="report-card" id="reportTarget">
      <div class="report-header">
        <h2 style="font-weight: 900; margin-bottom: 8px;">Relatório da Sessão</h2>
        <p style="color: var(--txt-muted); font-size: 14px;" id="rSubtitle">Sessão Finalizada</p>
      </div>

      <div class="stats-row">
        <div class="stat-mini"><strong id="rHits" style="color: var(--good)">0</strong><span>Acertos</span></div>
        <div class="stat-mini"><strong id="rMisses" style="color: var(--bad)">0</strong><span>Erros</span></div>
        <div class="stat-mini"><strong id="rPct" style="color: var(--txt-main)">0%</strong><span>Aproveitamento</span></div>
      </div>

      <div class="r-list" id="rList"></div>
    </div>
    
    <div style="width: min(800px, 100%); display:flex; gap:10px; margin-top:20px; margin-bottom: 40px;" data-html2canvas-ignore>
      <button class="btn btn-primary" style="flex:1" onclick="exportReportImage()">📸 Salvar Imagem da Sessão</button>
      <button class="btn" style="flex:1" onclick="showScreen('screenHome'); initHome();">🏠 Voltar à Home</button>
    </div>
  </div>

  <script>
    /* ==========================================================
       1. ESTADO GLOBAL E CONSTANTES
       ========================================================== */
    const LS_KEY = "FLASHCARDS_STATE_V1";
    const INTERVALS = [1, 3, 5, 7, 14, 21];
    
    let db = window.DB_FLASHCARDS || [];
    let state = {
      acertosTotal: 0,
      errosTotal: 0,
      acertosConsecutivos: 0,
      historico: {} 
    };

    /* ==========================================================
       2. ESTADO DA SESSÃO ATUAL
       ========================================================== */
    let session = {
      queue: [],
      currentIndex: 0,
      hits: 0,
      misses: 0,
      log: [], 
      answered: false
    };

    /* ==========================================================
       3. INICIALIZAÇÃO & UTILITÁRIOS
       ========================================================== */
    function loadState() {
      const saved = localStorage.getItem(LS_KEY);
      if (saved) state = JSON.parse(saved);
    }
    function saveState() {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    }
    
    function getTodayStr() {
      const d = new Date();
      const offset = d.getTimezoneOffset() * 60000;
      return new Date(d - offset).toISOString().split('T')[0];
    }
    function addDaysStr(dateStr, days) {
      const d = new Date(dateStr + 'T12:00:00Z');
      d.setDate(d.getDate() + days);
      return d.toISOString().split('T')[0];
    }

    function initHome() {
      loadState();
      document.getElementById('stTotal').textContent = db.length;
      document.getElementById('stAcertos').textContent = state.acertosTotal;
      document.getElementById('stFogo').textContent = state.acertosConsecutivos;

      const hoje = getTodayStr();
      let revCount = 0;
      db.forEach(card => {
        const hist = state.historico[card.id];
        if (hist && hist.proximaRevisao <= hoje) {
          revCount++;
        }
      });
      document.getElementById('countRevisao').textContent = revCount;
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    /* ==========================================================
       4. LÓGICA DE SESSÃO E RENDERIZAÇÃO
       ========================================================== */
    function startSession(mode) {
      loadState();
      session = { queue: [], currentIndex: 0, hits: 0, misses: 0, log: [], answered: false };
      
      const hoje = getTodayStr();

      if (mode === 'revisao') {
        session.queue = db.filter(card => {
          const hist = state.historico[card.id];
          return hist && hist.proximaRevisao <= hoje;
        });
        if (session.queue.length === 0) {
          alert("🎉 Você não tem revisões pendentes para hoje!");
          return;
        }
      } else {
        session.queue = [...db].sort(() => Math.random() - 0.5);
      }

      updatePerfBar();
      renderCurrentCard();
      showScreen('screenStudy');
    }

    function renderCurrentCard() {
      if (session.currentIndex >= session.queue.length) {
        finishSession();
        return;
      }

      const card = session.queue[session.currentIndex];
      session.answered = false;
      
      document.getElementById('actionArea').classList.remove('visible');

      document.getElementById('cardTema').textContent = card.tema;
      document.getElementById('cardPergunta').textContent = card.pergunta;
      
      const altsContainer = document.getElementById('altsContainer');
      altsContainer.innerHTML = '';
      
      const letters = ['A', 'B', 'C', 'D', 'E'];
      card.alternativas.forEach((altText, index) => {
        const btn = document.createElement('button');
        btn.className = 'alt-btn';
        btn.onclick = () => selectAlternative(index);
        btn.innerHTML = `<span class="alt-letter">${letters[index]}</span> <span>${altText}</span>`;
        altsContainer.appendChild(btn);
      });
      
      document.getElementById('sessionCounter').textContent = `Card ${session.currentIndex + 1} de ${session.queue.length}`;
    }

    function selectAlternative(selectedIndex) {
      if (session.answered) return;
      session.answered = true;

      const card = session.queue[session.currentIndex];
      const isHit = (selectedIndex === card.correta);

      const alts = document.querySelectorAll('.alt-btn');
      alts.forEach((btn, i) => {
        btn.disabled = true;
        if (i === card.correta) {
          btn.classList.add('correct');
        } else if (i === selectedIndex && !isHit) {
          btn.classList.add('wrong');
        }
      });

      document.getElementById('actionArea').classList.add('visible');
      registerAnswer(isHit, selectedIndex);
    }

    function advanceCard() {
      session.currentIndex++;
      renderCurrentCard();
    }

    /* ==========================================================
       5. MOTOR DE REVISÃO ESPAÇADA
       ========================================================== */
    function registerAnswer(isHit, selectedIndex) {
      const card = session.queue[session.currentIndex];
      const hoje = getTodayStr();

      if (isHit) session.hits++; else session.misses++;
      session.log.push({ q: card, hit: isHit, escolhida: selectedIndex });

      if (!state.historico[card.id]) {
        state.historico[card.id] = { acertos: 0, erros: 0, ultimaRevisao: hoje, proximaRevisao: hoje, intervalo: 0 };
      }
      
      let hist = state.historico[card.id];
      hist.ultimaRevisao = hoje;

      if (isHit) {
        hist.acertos++;
        state.acertosTotal++;
        state.acertosConsecutivos++;
        hist.intervalo = Math.min(hist.intervalo + 1, INTERVALS.length - 1);
      } else {
        hist.erros++;
        state.errosTotal++;
        state.acertosConsecutivos = 0; 
        hist.intervalo = 0; 
      }

      hist.proximaRevisao = addDaysStr(hoje, INTERVALS[hist.intervalo]);
      saveState();
      updatePerfBar();
    }

    function updatePerfBar() {
      const totalResponded = session.hits + session.misses;
      if (totalResponded === 0) {
        document.getElementById('perfGood').style.width = '0%';
        document.getElementById('perfBad').style.width = '0%';
        return;
      }
      const pGood = (session.hits / totalResponded) * 100;
      const pBad = (session.misses / totalResponded) * 100;
      document.getElementById('perfGood').style.width = pGood + '%';
      document.getElementById('perfBad').style.width = pBad + '%';
    }

    /* ==========================================================
       6. RELATÓRIOS E EXPORTAÇÃO (AJUSTE CIRÚRGICO REALIZADO)
       ========================================================== */
    function finishSession() {
      const total = session.hits + session.misses;
      if (total === 0) {
        showScreen('screenHome');
        initHome();
        return;
      }

      document.getElementById('rHits').textContent = session.hits;
      document.getElementById('rMisses').textContent = session.misses;
      const pct = Math.round((session.hits / total) * 100);
      document.getElementById('rPct').textContent = pct + '%';
      
      const rList = document.getElementById('rList');
      rList.innerHTML = '';

      const letters = ['A', 'B', 'C', 'D', 'E'];

      session.log.forEach(item => {
        const div = document.createElement('div');
        div.className = `r-item ${item.hit ? 'r-hit' : 'r-miss'}`;
        
        // Extrai os textos correspondentes usando os índices
        const txtEscolhida = item.q.alternativas[item.escolhida];
        const txtCorreta = item.q.alternativas[item.q.correta];

        div.innerHTML = `
          <div class="r-item-q">Pergunta: ${item.q.pergunta}</div>
          <div class="r-item-a">
            Sua resposta: <b>${letters[item.escolhida]}</b> - ${txtEscolhida}<br>
            Gabarito: <b>${letters[item.q.correta]}</b> - ${txtCorreta}<br><br>
            Resultado: <b>${item.hit ? 'Acertou ✅' : 'Errou ❌'}</b>
          </div>
        `;
        rList.appendChild(div);
      });

      showScreen('screenReport');
    }

    async function exportReportImage() {
      const node = document.getElementById('reportTarget');
      try {
        const canvas = await html2canvas(node, { backgroundColor: '#f1f3f5', scale: 2 });
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = `relatorio-sessao-${getTodayStr()}.png`;
        a.click();
      } catch(e) { alert("Erro ao gerar imagem"); }
    }

    /* ==========================================================
       7. MEDALHAS E CONQUISTAS
       ========================================================== */
    const MEDALS = [
      { id: 'm1', title: '50 Acertos', icon: '🥉', req: (s) => s.acertosTotal >= 50 },
      { id: 'm2', title: '100 Acertos', icon: '🥈', req: (s) => s.acertosTotal >= 100 },
      { id: 'm3', title: '300 Acertos', icon: '🥇', req: (s) => s.acertosTotal >= 300 },
      { id: 'f1', title: 'Fogo 10', icon: '🔥', req: (s) => s.acertosConsecutivos >= 10 },
      { id: 'f2', title: 'Raio 15', icon: '⚡', req: (s) => s.acertosConsecutivos >= 15 },
      { id: 'f3', title: 'Foguete 25', icon: '🚀', req: (s) => s.acertosConsecutivos >= 25 }
    ];

    function renderMedals() {
      loadState();
      const container = document.getElementById('medalsContainer');
      container.innerHTML = '';
      
      MEDALS.forEach(m => {
        const unlocked = m.req(state);
        const div = document.createElement('div');
        div.className = `medal-box ${unlocked ? 'unlocked' : ''}`;
        div.innerHTML = `
          <span class="medal-icon">${m.icon}</span>
          <span class="medal-title">${m.title}</span>
        `;
        container.appendChild(div);
      });
    }

    /* ==========================================================
       8. IMPORTAÇÃO / EXPORTAÇÃO JSON
       ========================================================== */
    function exportData() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
      const a = document.createElement('a');
      a.href = dataStr;
      a.download = `flashcards_backup_${getTodayStr()}.json`;
      a.click();
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedState = JSON.parse(e.target.result);
          if (importedState.historico !== undefined) {
            localStorage.setItem(LS_KEY, JSON.stringify(importedState));
            initHome();
            alert("Backup restaurado com sucesso!");
          } else {
            alert("Arquivo JSON inválido.");
          }
        } catch(err) { alert("Erro ao ler o arquivo."); }
      };
      reader.readAsText(file);
    }

    /* ==========================================================
       9. CONTROLES DE TECLADO
       ========================================================== */
    window.addEventListener('keydown', (ev) => {
      if (!document.getElementById('screenStudy').classList.contains('active')) return;
      
      const key = ev.key.toLowerCase();
      const keyMap = { 'a': 0, 'b': 1, 'c': 2, 'd': 3, 'e': 4 };
      
      if (keyMap[key] !== undefined && !session.answered) {
        ev.preventDefault();
        selectAlternative(keyMap[key]);
      }
      
      if ((key === ' ' || ev.code === 'Space' || key === 'enter') && session.answered) {
        ev.preventDefault();
        advanceCard();
      }
    });

    initHome();
  </script>
</body>
</html>
